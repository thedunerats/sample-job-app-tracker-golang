version: '3.8'

services:
  # Backend API Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: job-tracker-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/home/appuser/data/job_tracker.db
    volumes:
      # Persist database between container restarts
      - backend-data:/home/appuser/data
    networks:
      - job-tracker-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/jobs"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Frontend Angular App (served by nginx)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: job-tracker-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - job-tracker-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  job-tracker-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
